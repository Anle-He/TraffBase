# --------- General Configs ---------
GENERAL:
    runner: 'LTSFTrainer'
    batch_size: 32
    max_epochs: 20
    early_stop_patience: 5


# --------- Data Configs ---------
DATA:
    in_steps: 96
    out_steps: 96
    x_time_of_day: False
    x_day_of_week: False
    y_time_of_day: False
    y_day_of_week: False


# --------- Test Configs ---------
TEST:
    input_mask:
        enabled: False
        ratio: 0.10
        steps: null
        repeats: 3


# --------- Training Configs ---------
OPTIM:
    loss: 'MSE'
    initial_lr: 0.001
    lr_scheduler_type: 'ExponentialLR'
    lr_scheduler_gamma: 0.5 
    clip_grad: 5.0


# --------- Model Configs ---------
MODEL_PARAM:
    seq_len_in: 96
    seq_len_out: 96
    d_model: 512
    d_state: 32
    d_conv: 2
    expand: 1
    emb_dropout: 0.1
    ffn_dropout: 0.1
    d_ff: 512
    e_layers: 2
    use_norm: False
    ffn_activation: 'gelu'
